<div class="login-wrapper">
  <div class="login-card">
    <div class="logo-area">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
          <line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
        </svg>
      </div>
      <h1 class="logo-title">GymFlow</h1>
      <p class="logo-subtitle">Staff Portal</p>
    </div>

    <form id="loginForm" (ngSubmit)="onSubmit()" #f="ngForm" novalidate>
      <div class="form-group">
        <label for="emailInput">Email address</label>
        <input
          id="emailInput"
          type="email"
          class="form-input"
          placeholder="staff@gymflow.com"
          [(ngModel)]="email"
          name="email"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="passwordInput">Password</label>
        <input
          id="passwordInput"
          type="password"
          class="form-input"
          placeholder="••••••••"
          [(ngModel)]="password"
          name="password"
          required
          autocomplete="current-password"
        />
      </div>

      <div *ngIf="error" class="error-banner">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ error }}
      </div>

      <button id="loginBtn" type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="!loading">Sign In</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>
  </div>
</div>
